kind = "web"
previewPath = "/"
title = "Legal Consultation Website"
version = "1.0.0"
id = "artifacts/legal-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24438

[services.development]
run = "pnpm --filter @workspace/legal-site run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/legal-site", "run", "build"]

[services.production.run]
# Run the compiled SSR server — handles static files + on-demand SSR for
# /blog/:slug so every blog post is crawlable without a redeployment.
args = ["node", "artifacts/legal-site/dist/ssr-server.mjs"]

[services.production.run.env]
PORT = "24438"
NODE_ENV = "production"

[services.env]
PORT = "24438"
BASE_PATH = "/"
