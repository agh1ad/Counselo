<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />


    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1M9ZZX7VT6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1M9ZZX7VT6');
    </script>

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="ahgWvG0xGZzRQTcibteUzghojzVD_cxk3FxpDe3C15M" />

    <!-- Static infrastructure — identical on every route -->
    <meta name="theme-color" content="#00521a" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="application-name" content="CounselO" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="CounselO" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/logo.png" />

    <!--app-head-->

    <!-- Google Fonts — loaded after app-head so route head tags come first -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!--
      In dev mode: React mounts into this empty div (createRoot).
      In production: prerender.ts injects server-rendered HTML here before
      shipping to the client; React then hydrates (hydrateRoot) without
      replacing the existing DOM, preserving the SEO-critical content.
    -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
